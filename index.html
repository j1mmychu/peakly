<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0284c7" />
  <meta name="description" content="Peakly — Find surf, ski &amp; adventure spots when conditions and cheap flights align." />

  <!-- Open Graph -->
  <meta property="og:title" content="Peakly — Adventure When Conditions Align" />
  <meta property="og:description" content="Find surf, ski &amp; beach spots with perfect conditions and cheap flights. Real-time weather scoring for 180+ venues worldwide." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://j1mmychu.github.io/peakly/" />
  <meta property="og:image" content="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1200&h=630&fit=crop&crop=center" />
  <meta property="og:site_name" content="Peakly" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Peakly — Adventure When Conditions Align" />
  <meta name="twitter:description" content="Find surf, ski &amp; beach spots with perfect conditions and cheap flights." />
  <meta name="twitter:image" content="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1200&h=630&fit=crop&crop=center" />

  <title>Peakly</title>

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>P</text></svg>" />

  <!-- React 18 + ReactDOM (UMD, no build step needed) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel standalone — transforms JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; width: 100%; }
    body { background: #f5f5f5; font-family: sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Load app (Babel transforms JSX on the fly) -->
  <script type="text/babel" src="./app.jsx" data-presets="react"></script>

  <!-- Babel parse error fallback -->
  <script>
    window.addEventListener("error", function(e) {
      if (e.message && (e.message.includes("SyntaxError") || e.message.includes("Unexpected token"))) {
        var root = document.getElementById("root");
        root.innerHTML = '<div style="padding:40px;text-align:center;font-family:system-ui">' +
          '<h2 style="color:#ef4444;margin-bottom:12px">Peakly failed to load</h2>' +
          '<p style="color:#666;margin-bottom:8px">A syntax error was detected in app.jsx.</p>' +
          '<p style="color:#999;font-size:13px">' + e.message + '</p>' +
          '<button onclick="location.reload()" style="margin-top:20px;padding:10px 24px;border-radius:10px;border:none;background:#0284c7;color:white;font-weight:700;cursor:pointer">Retry</button>' +
          '</div>';
      }
    });
  </script>
</body>
</html>
