<!DOCTYPE html>

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Peakly — Find Surf, Ski &amp; Adventure Spots with Cheap Flights" />
  <meta name="twitter:description" content="Know when to go. Real-time condition scores + live flight deals for 180+ adventure venues worldwide." />
  <meta name="twitter:image" content="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1200&h=630&fit=crop&crop=center" />

  <title>Peakly — Find Surf, Ski &amp; Adventure Spots with Cheap Flights</title>
  <link rel="canonical" href="https://j1mmychu.github.io/peakly/" />

  <!-- Analytics: Plausible -->
  <script defer data-domain="j1mmychu.github.io" src="https://plausible.io/js/script.hash.js"></script>

  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://j1mmychu.github.io/peakly/#website",
        "url": "https://j1mmychu.github.io/peakly/",
        "name": "Peakly",
        "description": "Find surf, ski and adventure spots when conditions and cheap flights align."
      },
      {
        "@type": "WebApplication",
        "@id": "https://j1mmychu.github.io/peakly/#app",
        "name": "Peakly",
        "url": "https://j1mmychu.github.io/peakly/",
        "applicationCategory": "TravelApplication",
        "operatingSystem": "Web",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "featureList": "Real-time condition scoring, Flight price tracking, 180+ adventure venues, Vibe-based search, Trip planning, Condition alerts"
      },
      {
        "@type": "Organization",
        "@id": "https://j1mmychu.github.io/peakly/#org",
        "name": "Peakly",
        "url": "https://j1mmychu.github.io/peakly/"
      }
    ]
  }
  </script>

  <!-- PWA Manifest -->
  <link rel="manifest" href="./manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Peakly" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='36' fill='%230284c7'/><text x='90' y='134' font-size='112' font-family='system-ui' font-weight='700' fill='white' text-anchor='middle'>P</text></svg>" />

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>P</text></svg>" />

  <!-- React 18 + ReactDOM (UMD, no build step needed) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel standalone — transforms JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; width: 100%; }
    body { background: #f5f5f5; font-family: sans-serif; }
  </style>
</head>
<body>
  <div id="root">
    <h1 style="font-family:system-ui;text-align:center;padding:40px 20px;color:#222;font-size:24px;">
      Peakly — Surf, Ski &amp; Adventure Spots with Live Conditions &amp; Cheap Flights
    </h1>
    <p style="text-align:center;color:#717171;font-size:14px;max-width:400px;margin:0 auto;">
      Discover 170+ adventure destinations worldwide. Real-time weather scoring tells you when conditions are perfect.
    </p>
  </div>

  <!-- Load app (Babel transforms JSX on the fly) -->
  <script type="text/babel" src="./app.jsx?v=20260325d" data-presets="react"></script>

  <!-- Service Worker registration -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js").catch(function() {});
    }
  </script>

  <!-- Babel parse error fallback -->
  <script>
    window.addEventListener("error", function(e) {
      if (e.message && (e.message.includes("SyntaxError") || e.message.includes("Unexpected token"))) {
        var root = document.getElementById("root");
        root.innerHTML = '<div style="padding:40px;text-align:center;font-family:system-ui">' +
          '<h2 style="color:#ef4444;margin-bottom:12px">Peakly failed to load</h2>' +
          '<p style="color:#666;margin-bottom:8px">A syntax error was detected in app.jsx.</p>' +
          '<p style="color:#999;font-size:13px">' + e.message + '</p>' +
          '<button onclick="location.reload()" style="margin-top:20px;padding:10px 24px;border-radius:10px;border:none;background:#0284c7;color:white;font-weight:700;cursor:pointer">Retry</button>' +
          '</div>';
      }
    });
  </script>
</body>
</html>
